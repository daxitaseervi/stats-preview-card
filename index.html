<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <article class="card__content">
      <section class="card__headline">
        <h1 class="card__main-heading">
          Get <span class="card__main-heading__hlgt-wrd">insights</span> that help your business grow.
        </h1>

        <p class="card__description">
          Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
        </p>
      </section>

      <section class="card__stats">
        <div class="card__stats--company">
          <h2 class="card__stats__data">10k+</h2>
          <p class="card__stats__label">companies</p>
        </div>

        <div class="card__stats--templates">
          <h2 class="card__stats__data">314</h2>
          <p class="card__stats__label">templates</p>
        </div>

        <div class="card__stats--company">
          <h2 class="card__stats__data">12m+</h2>
          <p class="card__stats__label">queries</p>
        </div>
      </section>

      <section class="card__header-img">
        <picture>
          <source media="(min-width: 1024px)" srcset="./images/image-header-desktop.jpg">
          
          <img src="images/image-header-mobile.jpg" alt="employees working in the office">
        </picture>
      </section>
    </article>
  </main>
</body>
</html>
